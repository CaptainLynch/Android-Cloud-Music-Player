name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36"

      - name: Grant Gradle Wrapper Permission
        run: chmod +x CloudMusicPlayer/gradlew

      - name: Build Release APK
        working-directory: CloudMusicPlayer
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicPlayer-release
          path: CloudMusicPlayer/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest Build
          tag_name: release-latest
          files: CloudMusicPlayer/app/build/outputs/apk/release/*.apk
          prerelease: true
          generate_release_notes: true
